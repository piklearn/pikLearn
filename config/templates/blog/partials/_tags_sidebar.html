<div class="sidebar-card">
    <h5 class="sidebar-title">
        <i class="bi bi-tags-fill"></i> {{ title|default:"برچسب‌ها" }}
    </h5>
    <div class="sidebar-tag-cloud">
        {% for tag in tags %}
            <a href="{{ tag.get_absolute_url }}" class="tag">#{{ tag.title }}</a>
        {% empty %}
            <span class="text-muted small">برچسبی وجود ندارد</span>
        {% endfor %}
    </div>
</div>
