{% load crispy_forms_tags %}
{% load static %}
<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap must load first: style.css below relies on redefining its CSS variables -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" integrity="sha384-dpuaG1suU0eT09tx5plTaGMLBsfDLzUCCUXOY2j/LSvXYuG6Bqs43ALlhIqAJVRb" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <!-- Loaded eagerly (no defer) so the saved theme is applied before first paint -->
    <script src="{% static 'js/theme.js' %}"></script>

    <title>پیک لرن | {% block head_title %}{% endblock head_title %}</title>
  </head>
  <body class="d-flex justify-content-center align-items-center vh-100">
    <button
      type="button"
      id="themeToggle"
      class="theme-toggle position-fixed top-0 start-0 m-3"
      aria-label="تغییر پوسته روشن و تاریک"
      aria-pressed="false"
    >
      <i class="bi bi-sun-fill theme-toggle-icon sun"></i>
      <i class="bi bi-moon-stars-fill theme-toggle-icon moon"></i>
      <span class="theme-toggle-thumb"></span>
    </button>

    <div class="my-auto auth-card p-5" style="width: 500px;">
        <h3 class="text-center">{% block form_title %}{% endblock form_title %}</h3> 
        <hr>
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-primary w-100 mt-3">{% block btn_text %}{% endblock btn_text %}</button>
        </form>
        <hr>
        {% block extra_tags %}
                
        {% endblock extra_tags %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <!-- Ambient cursor glow: purely decorative, never intercepts clicks -->
    <div id="cursor-glow" aria-hidden="true"></div>
  </body>
</html>
